name: Fetch Stock Prices

# 手動実行（将来的にはstockアプリのフロントエンドからGitHub APIのworkflow_dispatchで起動する想定）
on:
  workflow_dispatch:
    inputs:
      codes:
        description: "証券コード（カンマ区切りで複数指定可。例: 7203,9984,6758）"
        required: true
        default: "7203"
      period:
        description: "相対期間（yfinance形式。例: 5d, 1mo）。空欄なら2013年以降の全期間を取得"
        required: false
        default: ""

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: コードリポジトリ（このリポジトリ）をチェックアウト
        uses: actions/checkout@v4
        with:
          path: code-repo

      - name: データリポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          repository: palmelo2nd/brain_data
          token: ${{ secrets.DATA_REPO_TOKEN }}
          path: data-repo

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存パッケージをインストール
        run: pip install -r code-repo/stock/scripts/requirements.txt

      - name: 株価を取得
        run: |
          ARGS=(--codes "${{ inputs.codes }}" --output-dir "${{ github.workspace }}/data-repo/stock/prices")
          if [ -n "${{ inputs.period }}" ]; then
            ARGS+=(--period "${{ inputs.period }}")
          fi
          python code-repo/stock/scripts/fetch_prices.py "${ARGS[@]}"

      - name: データリポジトリへコミット・プッシュ
        working-directory: data-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock/prices
          if git diff --cached --quiet; then
            echo "変更なし。コミットをスキップします。"
          else
            git commit -m "chore: 株価データ更新（${{ inputs.codes }}）"
            # 他のワークフロー実行と同時にpushして拒否された場合に備え、pull --rebaseしてから再試行する
            for i in 1 2 3 4 5; do
              if git push; then
                break
              fi
              echo "pushに失敗しました。リモートの変更を取り込んで再試行します（${i}回目）"
              git pull --rebase origin main
            done
          fi

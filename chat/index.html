<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Chat</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ログインモーダル -->
<div id="login-modal" class="login-modal">
    <div class="login-box">
        <h2>Brain Chat</h2>
        <label>PAT（アクセストークン）</label>
        <input type="password" id="login-pat" placeholder="ghp_...">
        <label>表示名</label>
        <input type="text" id="login-name" placeholder="名前を入力">
        <button id="login-btn">ログイン</button>
        <p id="login-error" class="error hidden"></p>
    </div>
</div>

<!-- メインレイアウト -->
<div id="app" class="app hidden">
    <aside class="sidebar">
        <div class="sidebar-header">Brain Chat</div>
        <nav id="room-list" class="room-list"></nav>
        <div class="sidebar-footer">
            <span id="current-user"></span>
            <button id="logout-btn">ログアウト</button>
        </div>
    </aside>
    <main class="chat-main">
        <header class="chat-header">
            <h1 id="room-name"></h1>
            <div class="chat-header-right">
                <span id="auto-refresh-indicator" title="30秒ごとに自動更新">●</span>
                <button id="refresh-btn">更新</button>
            </div>
        </header>
        <div id="message-list" class="message-list"></div>
        <div class="input-area">
            <textarea id="message-input" placeholder="メッセージを入力… (Enterで送信 / Shift+Enterで改行)" rows="2"></textarea>
            <button id="send-btn">送信</button>
        </div>
    </main>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>

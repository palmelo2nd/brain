<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Brain タスク管理</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>

<div class="app-shell">

    <!-- ========== サイドメニュー ========== -->
    <aside class="sidebar">

        <!-- 共通コントロール（全ページで使用） -->
        <div class="sidebar-header">
            <p class="app-title">Second Brain</p>

            <label class="sidebar-label" for="token-input">PW</label>
            <input type="password" id="token-input" placeholder="github_pat_...">

            <span id="network-status"></span>

            <div class="btn-group">
                <button id="load-btn">Load</button>
                <button id="save-btn">Save</button>
            </div>

            <div class="btn-group btn-group--excel">
                <button id="excel-export-btn">Export</button>
                <label class="file-label" for="excel-import">
                    Import
                    <input type="file" id="excel-import" accept=".xlsx">
                </label>
            </div>
        </div>

        <!-- ページナビゲーション -->
        <nav class="sidebar-nav">
            <button class="nav-btn" data-page="dashboard">ダッシュボード</button>
            <button class="nav-btn" data-page="inbox">情報整理</button>
            <button class="nav-btn" data-page="task">タスク</button>
            <button class="nav-btn" data-page="knowledge">ナレッジ</button>
        </nav>

        <!-- カテゴリフィルタ -->
        <div class="category-filter">
            <p class="sidebar-label">カテゴリ</p>
            <div id="category-list">
                <!-- データ読み込み後に JS で描画 -->
            </div>
        </div>

    </aside>

    <!-- ========== メインコンテンツ ========== -->
    <main class="main-content">

        <div id="page-dashboard" class="page">
            <h2>ダッシュボード</h2>
            <div id="dashboard-warning"></div>

            <!-- INBOX（デフォルト展開） -->
            <details class="expander" open>
                <summary class="expander-title">INBOX — 思いついたことをすぐ記録</summary>
                <div class="inbox-form">
                    <textarea id="inbox-content" class="inbox-textarea"
                              placeholder="内容を入力してください..." rows="4"></textarea>
                    <div class="inbox-toolbar">
                        <span id="inbox-category-badge" class="inbox-category-badge"></span>
                        <button id="inbox-submit-btn" class="inbox-btn">登録</button>
                    </div>
                </div>
            </details>

            <!-- タスク実行（デフォルト展開） -->
            <details class="expander" open>
                <summary class="expander-title" id="summary-task-runner-dash">タスク実行</summary>
                <div id="task-runner-dash"></div>
            </details>
        </div>

        <div id="page-inbox" class="page">
            <h2>情報整理</h2>

            <!-- 警告バナー（1行） -->
            <div id="master-warning"></div>

            <!-- 編集（INBOX／タスク／ナレッジ／アイデア／アーカイブ 統合編集・新規登録、デフォルト展開） -->
            <details class="expander" open>
                <summary class="expander-title" id="summary-edit">編集</summary>

                <!-- 対象データ区分タブ（一覧の絞り込み） -->
                <div id="edit-kubun-tabs" class="triage-kubun-tabs"></div>

                <!-- フィルタエリア -->
                <div id="edit-filter-area" class="triage-filter-area"></div>

                <!-- 一覧テーブル -->
                <div class="table-wrapper">
                    <table id="table-edit-list"></table>
                </div>

                <!-- 入力・編集フォーム（未選択時は新規登録、選択時はその行の編集） -->
                <div class="triage-form">

                    <!-- 内容（新規登録・編集どちらでも入力可） -->
                    <div id="edit-content-row" class="triage-form-row triage-form-row--top">
                        <label>内容</label>
                        <textarea id="edit-content" class="triage-textarea" rows="8" placeholder="内容を入力してください"></textarea>
                    </div>

                    <div class="triage-form-row">
                        <label>移動先のデータ区分 <span class="required">*</span></label>
                        <select id="edit-kubun"></select>
                    </div>
                    <div class="triage-form-row">
                        <label>タイトル</label>
                        <input type="text" id="edit-title" placeholder="（省略可）">
                    </div>
                    <div class="triage-form-row">
                        <label>備考</label>
                        <input type="text" id="edit-biko" placeholder="（省略可）">
                    </div>
                    <div class="triage-form-row">
                        <label>カテゴリ</label>
                        <select id="edit-category"></select>
                    </div>
                    <div class="triage-form-row">
                        <label>タグ</label>
                        <select id="edit-tag"></select>
                    </div>
                    <div class="triage-form-row">
                        <label>ハブ</label>
                        <select id="edit-hub"></select>
                    </div>

                    <!-- ステータス（タスク／ナレッジ選択時） -->
                    <div id="edit-status-row" class="triage-form-row" style="display:none">
                        <label>ステータス</label>
                        <select id="edit-status"></select>
                    </div>

                    <!-- 優先度・期限・見積時間（タスク選択時のみ） -->
                    <div id="edit-priority-row" class="triage-form-row" style="display:none">
                        <label>優先度</label>
                        <select id="edit-priority"></select>
                    </div>
                    <div id="edit-deadline-row" class="triage-form-row" style="display:none">
                        <label>期限</label>
                        <input type="date" id="edit-deadline">
                    </div>
                    <div id="edit-estimate-row" class="triage-form-row" style="display:none">
                        <label>見積時間（h）</label>
                        <input type="number" id="edit-estimate" min="0" step="0.5" placeholder="（省略可）">
                    </div>

                    <!-- Input・Output（ナレッジ選択時のみ） -->
                    <div id="edit-input-row" class="triage-form-row" style="display:none">
                        <label>Input</label>
                        <select id="edit-input"></select>
                    </div>
                    <div id="edit-output-row" class="triage-form-row" style="display:none">
                        <label>Output</label>
                        <select id="edit-output"></select>
                    </div>

                    <div class="triage-toolbar">
                        <span id="edit-selection-info" class="triage-info"></span>
                        <button id="edit-new-btn" class="triage-btn">新規登録</button>
                        <button id="edit-apply-btn" class="triage-btn">変更</button>
                        <button id="edit-delete-btn" class="triage-btn triage-btn--danger">削除</button>
                    </div>
                </div>
            </details>

            <!-- 変数定義の編集（デフォルト折り畳み） -->
            <details class="expander">
                <summary class="expander-title" id="summary-var-edit">
                    変数定義の編集
                </summary>
                <div class="edit-table-toolbar">
                    <button id="apply-master-btn">変更を適用する</button>
                </div>
                <div class="table-wrapper">
                    <table id="table-edit-master"></table>
                </div>
            </details>

            <!-- マスタ値 編集（ラジオ切り替え） -->
            <details class="expander">
                <summary class="expander-title" id="summary-master-values">マスタ値の編集</summary>
                <div class="master-value-switcher">
                    <div class="master-radio-group">
                        <label class="master-radio-label">
                            <input type="radio" name="master-value-type" value="kubun">
                            データ区分
                        </label>
                        <label class="master-radio-label">
                            <input type="radio" name="master-value-type" value="category">
                            カテゴリ
                        </label>
                        <label class="master-radio-label">
                            <input type="radio" name="master-value-type" value="tag">
                            タグ
                        </label>
                        <label class="master-radio-label">
                            <input type="radio" name="master-value-type" value="hub">
                            ハブ
                        </label>
                        <label class="master-radio-label">
                            <input type="radio" name="master-value-type" value="status">
                            ステータス
                        </label>
                        <label class="master-radio-label">
                            <input type="radio" name="master-value-type" value="priority">
                            優先度
                        </label>
                        <label class="master-radio-label">
                            <input type="radio" name="master-value-type" value="input">
                            Input
                        </label>
                        <label class="master-radio-label">
                            <input type="radio" name="master-value-type" value="output">
                            Output
                        </label>
                        <label class="master-radio-label">
                            <input type="radio" name="master-value-type" value="frequency">
                            繰返し頻度
                        </label>
                    </div>
                    <div id="section-master-value-editor"></div>
                </div>
            </details>

            <!-- データ閲覧・直接編集（デフォルト折り畳み） -->
            <details class="expander">
                <summary class="expander-title" id="summary-main">
                    メインデータ 一覧
                </summary>
                <div class="table-wrapper">
                    <table id="table-main"></table>
                </div>
            </details>

            <details class="expander">
                <summary class="expander-title" id="summary-master">
                    マスタデータ 一覧
                </summary>
                <div class="table-wrapper">
                    <table id="table-master"></table>
                </div>
            </details>

            <!-- 直近の更新データ（デフォルト折り畳み） -->
            <details class="expander">
                <summary class="expander-title" id="summary-recent">
                    直近の更新データ
                </summary>
                <div class="table-wrapper">
                    <table id="table-recent"></table>
                </div>
            </details>
        </div>

        <div id="page-task" class="page">
            <h2>タスク</h2>

            <!-- タスク実行（デフォルト展開） -->
            <details class="expander" open>
                <summary class="expander-title" id="summary-task-runner-task">タスク実行</summary>
                <div id="task-runner-task"></div>
            </details>

            <!-- 繰り返しタスク -->
            <details class="expander" open>
                <summary class="expander-title" id="summary-recurring">繰り返しタスク</summary>
                <div id="recurring-section"></div>
            </details>

            <!-- load-btn / save-btn ハンドラが参照する要素（非表示） -->
            <div id="content-box" style="display:none"></div>
        </div>

        <div id="page-knowledge" class="page">
            <h2>ナレッジ</h2>
        </div>

    </main>

</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
